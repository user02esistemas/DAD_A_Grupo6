<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #dc3545;
        }
        p {
            font-size: 1.1em;
            max-width: 400px;
        }
        .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0d6efd;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="icon">📶❌</div>
    <h1>Sin Conexión a Internet</h1>
    <p>Parece que has perdido la conexión. La aplicación requiere acceso a la red para procesar comandas y pagos.</p>
    <button class="btn" onclick="window.location.reload()">Reintentar</button>
</body>
</html>
